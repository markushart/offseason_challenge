name: Deploy Firestore rules

on:
  push:
    branches:
      - develop
      - main
    paths:
      - firebase.json
      - firestore.indexes.json
      - firestore.rules

jobs:
  deploy_firestore_rules:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: offseason-challenge
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Write Firebase service account
        run: |
          credentials_path="$RUNNER_TEMP/firebase-service-account.json"
          printf "%s" "$FIREBASE_SERVICE_ACCOUNT" > "$credentials_path"
          printf "GOOGLE_APPLICATION_CREDENTIALS=%s\n" "$credentials_path" >> "$GITHUB_ENV"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OFFSEASON_CHALLENGE }}
      - name: Deploy Firestore rules and indexes
        run: npx -y firebase-tools@latest deploy --only firestore:rules,firestore:indexes --project "$FIREBASE_PROJECT_ID"
