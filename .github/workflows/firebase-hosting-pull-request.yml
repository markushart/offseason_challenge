# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_USE_FIREBASE_EMULATORS: "false"
      FIREBASE_PROJECT_ID: offseason-challenge
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: offseason_challenge/package-lock.json
      - name: Install and Build
        run: npm ci && npm run ci
        working-directory: offseason_challenge
      - name: Write Firebase service account
        run: |
          credentials_path="$RUNNER_TEMP/firebase-service-account.json"
          printf "%s" "$FIREBASE_SERVICE_ACCOUNT" > "$credentials_path"
          printf "GOOGLE_APPLICATION_CREDENTIALS=%s\n" "$credentials_path" >> "$GITHUB_ENV"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OFFSEASON_CHALLENGE }}
      - name: Deploy Firebase Hosting preview
        id: deploy_preview
        run: |
          npx -y firebase-tools@latest hosting:channel:deploy \
            "pr-${{ github.event.pull_request.number }}" \
            --expires 7d \
            --project "$FIREBASE_PROJECT_ID" \
            --json > "$RUNNER_TEMP/firebase-preview.json"

          node <<'NODE'
          const fs = require("fs");
          const path = `${process.env.RUNNER_TEMP}/firebase-preview.json`;
          const data = JSON.parse(fs.readFileSync(path, "utf8"));
          const urls = [];

          const visit = (value) => {
            if (typeof value === "string" && value.startsWith("https://") && value.includes(".web.app")) {
              urls.push(value);
              return;
            }

            if (Array.isArray(value)) {
              value.forEach(visit);
              return;
            }

            if (value && typeof value === "object") {
              Object.values(value).forEach(visit);
            }
          };

          visit(data);

          const channelId = `pr-${process.env.PR_NUMBER}`;
          const previewUrl = urls.find((url) => url.includes(`--${channelId}-`)) ?? urls[0];

          if (!previewUrl) {
            throw new Error("Firebase preview URL was not found in deploy output.");
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `preview_url=${previewUrl}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `Firebase Hosting preview: ${previewUrl}\n`);
          NODE
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
      - name: Comment preview URL
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Firebase Hosting preview: ${{ steps.deploy_preview.outputs.preview_url }}"
        env:
          GH_TOKEN: ${{ github.token }}
