name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_USE_FIREBASE_EMULATORS: "false"
      FIREBASE_PROJECT_ID: offseason-challenge
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: offseason_challenge/package-lock.json
      - name: Install and Build
        run: npm ci && npm run ci
        working-directory: offseason_challenge
      - name: Write Firebase service account
        run: |
          credentials_path="$RUNNER_TEMP/firebase-service-account.json"
          printf "%s" "$FIREBASE_SERVICE_ACCOUNT" > "$credentials_path"
          printf "GOOGLE_APPLICATION_CREDENTIALS=%s\n" "$credentials_path" >> "$GITHUB_ENV"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OFFSEASON_CHALLENGE }}
      - name: Deploy Firebase Hosting preview
        run: |
          npx -y firebase-tools@latest hosting:channel:deploy \
            "pr-${{ github.event.pull_request.number }}" \
            --expires 7d \
            --project "$FIREBASE_PROJECT_ID"
